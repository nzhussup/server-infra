apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-infra
  namespace: argocd
spec:
  description: Platform infrastructure managed from Git
  orphanedResources:
    # Enable visibility in UI first without noisy app warnings.
    warn: false
    ignore:
      # Common operator-managed secret pattern (cert-manager).
      - kind: Secret
        name: cm-acme-http-solver-*
  sourceRepos:
    - 'https://github.com/nzhussup-studio/platform-infra.git'
  destinations:
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
