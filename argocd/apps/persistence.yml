apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: persistence
  namespace: argocd
spec:
  project: platform-infra
  source:
    repoURL: https://github.com/nzhussup-studio/platform-infra.git
    targetRevision: main
    path: k8s/persistence
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true