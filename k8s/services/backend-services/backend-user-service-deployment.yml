apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-user-service
  template:
    metadata:
      labels:
        app: backend-user-service
    spec:
      containers:
        - name: backend-user-service
          image: nzhussup/backend-user-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: AUTH_SERVICE_URL
              value: "http://backend-auth-service.default.svc.cluster.local:8083"
            - name: SPRING_DATASOURCE_HOST
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_HOST
            - name: SPRING_DATASOURCE_DB
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_NAME
            - name: SPRING_DATASOURCE_PORT
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_PORT
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: DB_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: backend-user-service
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: backend-user-service
