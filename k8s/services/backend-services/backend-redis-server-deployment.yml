apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-redis-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-redis-server
  template:
    metadata:
      labels:
        app: backend-redis-server
    spec:
      containers:
        - name: backend-redis-server
          image: nzhussup/backend-redis-server:latest
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: backend-redis-server
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: backend-redis-server
