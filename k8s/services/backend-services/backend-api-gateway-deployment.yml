apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api-gateway
  template:
    metadata:
      labels:
        app: backend-api-gateway
    spec:
      containers:
        - name: backend-api-gateway
          image: nzhussup/backend-api-gateway:latest
          ports:
            - containerPort: 8082
          env:
            - name: GIN_MODE
              value: "release"
            - name: AUTH_SERVICE_URL
              value: "http://backend-auth-service.default.svc.cluster.local:8083"
            - name: BASE_SERVICE_URL
              value: "http://backend-base-service.default.svc.cluster.local:8010"
            - name: USER_SERVICE_URL
              value: "http://backend-user-service.default.svc.cluster.local:8084"
            - name: IMAGE_SERVICE_URL
              value: "http://backend-image-service.default.svc.cluster.local:8085"
            - name: LLM_SERVICE_URL
              value: "http://backend-llm-service.default.svc.cluster.local:8086"
            - name: WEDDING_SERVICE_URL
              value: "http://wedding-backend-service.default.svc.cluster.local:9090"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-gateway
spec:
  selector:
    app: backend-api-gateway
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
  type: ClusterIP
