apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-auth-service
  template:
    metadata:
      labels:
        app: backend-auth-service
    spec:
      containers:
        - name: backend-auth-service
          image: nzhussup/backend-auth-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_HOST
              valueFrom:
                configMapKeyRef:
                  name: admin-panel-config
                  key: DB_HOST
            - name: SPRING_DATASOURCE_DB
              valueFrom:
                configMapKeyRef:
                  name: admin-panel-config
                  key: DB_NAME
            - name: SPRING_DATASOURCE_PORT
              valueFrom:
                configMapKeyRef:
                  name: admin-panel-config
                  key: DB_PORT
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: admin-panel-config
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-panel-secrets
                  key: DB_PASSWORD
            - name: SECURITY_JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: admin-panel-secrets
                  key: JWT_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: backend-auth-service
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: backend-auth-service
