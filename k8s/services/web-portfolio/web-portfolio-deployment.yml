apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-portfolio
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-portfolio
  template:
    metadata:
      labels:
        app: web-portfolio
    spec:
      containers:
        - name: web-portfolio
          image: nzhussup/web-portfolio:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-portfolio-service
  namespace: default
spec:
  selector:
    app: web-portfolio
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
