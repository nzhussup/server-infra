apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-default
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/tcp-no-delay: "true"
    nginx.ingress.kubernetes.io/tcp-no-push: "true"
    nginx.ingress.kubernetes.io/keep-alive: "true"
    nginx.ingress.kubernetes.io/http2: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: sabina.valentine.nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: valentine-service
                port:
                  number: 888
    - host: study.nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: freestudydrive-service
                port:
                  number: 777
    - host: nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: web-portfolio-service
                port:
                  number: 8000
    - host: api.nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-nginx-gateway
                port:
                  number: 8082
    - host: admin.nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: web-admin-panel-service
                port:
                  number: 8020
    - host: auth.nzhussup.dev
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-keycloak-server
                port:
                  number: 8080
  tls:
    - hosts:
        - sabina.valentine.nzhussup.dev
        - study.nzhussup.dev
        - nzhussup.dev
        - api.nzhussup.dev
        - admin.nzhussup.dev
        - auth.nzhussup.dev
      secretName: default-tls
