apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-auth-service
  template:
    metadata:
      labels:
        app: backend-auth-service
    spec:
      containers:
        - name: backend-auth-service
          image: nzhussup/backend-auth-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_HOST
              value: local-db-service:5555/admin_db
            - name: SPRING_DATASOURCE_USERNAME
              value: "nurik"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "1234"
            - name: SECURITY_JWT_SECRET_KEY
              value: "secret"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-auth-service
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: backend-auth-service
